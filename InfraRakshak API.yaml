  /api/v1/accounts/contractors/:
    get:
      operationId: accounts_contractors_list
      description: CRUD for Contractor profiles.
      summary: List contractors
      parameters:
      - in: query
        name: is_available
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: specialization
        schema:
          type: string
          enum:
          - ELECTRICAL
          - MULTI
          - PLUMBING
          - STRUCTURAL
        description: |-
          * `PLUMBING` - Plumbing
          * `ELECTRICAL` - Electrical
          * `STRUCTURAL` - Structural
          * `MULTI` - Multi-Discipline
      tags:
      - Accounts
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedContractorList'
          description: ''
    post:
      operationId: accounts_contractors_create
      description: CRUD for Contractor profiles.
      summary: Create contractor profile
      tags:
      - Accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractorRequest'
            examples:
              CreateContractor:
                value:
                  user: 2
                  company_name: BuildRight Infra Pvt Ltd
                  license_number: GJ-CON-2024-00123
                  specialization: PLUMBING
                  experience_years: 8
                  is_available: true
                summary: Create Contractor
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ContractorRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ContractorRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contractor'
          description: ''
