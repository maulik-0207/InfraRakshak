openapi: 3.0.3
info:
  title: InfraRakshak API
  version: 1.0.0
  description: |-
    Production API for the InfraRakshak school infrastructure monitoring platform.

    ## Authentication
    All endpoints (except login/register) require a JWT Bearer token.
    Obtain tokens via `POST /api/v1/auth/token/`.

    Pass the access token in the `Authorization` header:
    ```
    Authorization: Bearer <access_token>
    ```
paths:
  /api/v1/accounts/admin-staff/:
    get:
      operationId: accounts_admin_staff_list
      description: CRUD for AdminStaff profiles.
      summary: List admin staff
      parameters:
      - in: query
        name: district
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Accounts
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminStaffList'
          description: ''
    post:
      operationId: accounts_admin_staff_create
      description: CRUD for AdminStaff profiles.
      summary: Create admin staff profile
      tags:
      - Accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminStaffRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminStaffRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminStaffRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStaff'
          description: ''
  /api/v1/accounts/admin-staff/{id}/:
