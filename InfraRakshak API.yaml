      type: object
      description: Serializer for AdminStaff profile.
      properties:
        user:
          type: integer
        office_name:
          type: string
          minLength: 1
          maxLength: 255
        designation:
          type: string
          minLength: 1
          maxLength: 100
        district:
          type: string
          minLength: 1
          maxLength: 100
