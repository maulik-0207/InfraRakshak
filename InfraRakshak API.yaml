      operationId: contracts_proofs_create
      description: |-
        Upload evidence files for a contract.

        **Request format:** `multipart/form-data`

        **File constraints:**
        - Maximum size: 10 MB
        - Allowed types: jpg, jpeg, png, gif, webp, mp4, avi, mov, mkv, pdf, doc, docx
        - `file_type`: IMAGE | VIDEO | DOCUMENT
      summary: Upload work proof
      tags:
      - Contracts
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                contract:
                  type: integer
                  description: Contract ID
                file:
                  type: string
                  format: binary
                  description: File to upload (max 10MB)
                file_type:
                  type: string
                  enum:
                  - IMAGE
                  - VIDEO
                  - DOCUMENT
                description:
                  type: string
                uploaded_by:
                  type: integer
                  description: User ID
              required:
              - contract
              - file
              - file_type
              - uploaded_by
